name: kokoro_test

on: workflow_call

jobs:
  kokoro_test:
    runs-on: ubuntu-24.04
    if: github.repository_owner == 'hwdsl2'
    strategy:
      matrix:
        test_id: [no-env, with-env, with-key]
      fail-fast: false
    env:
      TEST_ID: ${{ matrix.test_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Test
        run: |
          [ ! -x /usr/bin/docker ] && exit 1

          cd "$GITHUB_WORKSPACE"
          pwd
          ls -ld kokoro.env.example

          sed -i \
            -e '/KOKORO_LOG_LEVEL=/s/# //' \
            -e '/KOKORO_VOICE=/s/# //' \
            kokoro.env.example

          set -x

          docker build -t kokoro-test .

          if [ "$TEST_ID" = "with-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v kokoro-test-data:/var/lib/kokoro \
              -v ./kokoro.env.example:/kokoro.env:ro \
              -p 8880:8880/tcp \
              -d kokoro-test
          elif [ "$TEST_ID" = "no-env" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v kokoro-test-data:/var/lib/kokoro \
              -p 8880:8880/tcp \
              -d kokoro-test
          elif [ "$TEST_ID" = "with-key" ]; then
            docker run \
              --name "$TEST_ID" \
              --restart=always \
              -v kokoro-test-data:/var/lib/kokoro \
              -e KOKORO_API_KEY=test-kokoro-key \
              -p 8880:8880/tcp \
              -d kokoro-test
          fi

          # Wait for server to be ready (up to 300 seconds for model download)
          i=0
          while [ "$i" -lt 300 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:8880/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify health endpoint
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:8880/health

          # Build optional auth header args
          kokoro_curl_args=()
          [ "$TEST_ID" = "with-key" ] && kokoro_curl_args=(-H "Authorization: Bearer test-kokoro-key")

          # Test auth enforcement when KOKORO_API_KEY is set
          if [ "$TEST_ID" = "with-key" ]; then
            http_code=$(curl -s -o /dev/null -w '%{http_code}' \
              http://127.0.0.1:8880/v1/audio/speech \
              -H "Content-Type: application/json" \
              -d '{"model":"tts-1","input":"Hi","voice":"af_heart"}' 2>/dev/null || true)
            [ "$http_code" = "401" ] || { echo "Expected 401 without key, got $http_code"; exit 1; }
          fi

          # Verify models endpoint
          curl -sf http://127.0.0.1:8880/v1/models \
            "${kokoro_curl_args[@]}" \
            | grep -q '"object"'

          # Test kokoro_manage commands
          docker exec "$TEST_ID" kokoro_manage --showinfo
          docker exec "$TEST_ID" kokoro_manage --listvoices

          # Test speech endpoint (mp3 format)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"af_heart"}' \
            -o /tmp/test_speech.mp3 \
            && [ -s /tmp/test_speech.mp3 ]

          # Test speech endpoint (wav format)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"af_heart","response_format":"wav"}' \
            -o /tmp/test_speech.wav \
            && [ -s /tmp/test_speech.wav ]

          # Test speech endpoint (flac format)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"af_heart","response_format":"flac"}' \
            -o /tmp/test_speech.flac \
            && [ -s /tmp/test_speech.flac ]

          # Test speech endpoint (British voice — verifies auto lang_code selection)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello from London.","voice":"bf_emma","response_format":"wav"}' \
            -o /tmp/test_speech_british.wav \
            && [ -s /tmp/test_speech_british.wav ]

          # Test streaming endpoint (pcm format — verifies stream=true path)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"af_heart","response_format":"pcm","stream":true}' \
            -o /tmp/test_speech_stream.pcm \
            && [ -s /tmp/test_speech_stream.pcm ]

          # Test volume_multiplier field (verifies volume scaling path)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"af_heart","response_format":"wav","volume_multiplier":1.5}' \
            -o /tmp/test_speech_volume.wav \
            && [ -s /tmp/test_speech_volume.wav ]

          # Test speed field (verifies speed scaling path)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"af_heart","response_format":"wav","speed":1.25}' \
            -o /tmp/test_speech_speed.wav \
            && [ -s /tmp/test_speech_speed.wav ]

          # Test OpenAI voice alias (verifies alias mapping path)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Hello world","voice":"alloy","response_format":"wav"}' \
            -o /tmp/test_speech_alias.wav \
            && [ -s /tmp/test_speech_alias.wav ]

          # Test voices endpoint (verify non-English voices are listed)
          curl -sf http://127.0.0.1:8880/v1/voices \
            "${kokoro_curl_args[@]}" \
            | grep -q '"voices"'
          curl -sf http://127.0.0.1:8880/v1/voices \
            "${kokoro_curl_args[@]}" \
            | grep -q 'im_nicola'

          # Test Italian voice (verifies non-English language pipeline loads on demand)
          curl -sf http://127.0.0.1:8880/v1/audio/speech \
            -H "Content-Type: application/json" \
            "${kokoro_curl_args[@]}" \
            -d '{"model":"tts-1","input":"Ciao mondo","voice":"im_nicola","response_format":"wav"}' \
            -o /tmp/test_speech_italian.wav \
            && [ -s /tmp/test_speech_italian.wav ]

          docker restart "$TEST_ID"

          sleep 15

          # Wait for server to come back (up to 120 seconds)
          i=0
          while [ "$i" -lt 120 ]; do
            if docker exec "$TEST_ID" curl -sf http://127.0.0.1:8880/health >/dev/null 2>&1; then
              break
            fi
            sleep 1
            i=$((i + 1))
          done

          docker ps | grep "$TEST_ID"
          docker logs "$TEST_ID"

          # Verify server is healthy after restart
          docker exec "$TEST_ID" curl -sf http://127.0.0.1:8880/health

          exit 0
      - name: Clear
        if: always()
        run: |
          docker rm -f "$TEST_ID" || true
          docker volume rm kokoro-test-data || true
          docker rmi kokoro-test || true